services:

  db:
    image: postgres:16-alpine
    container_name: c2p_db
    environment:
      POSTGRES_DB: c2p_db
      POSTGRES_USER: c2p_user
      POSTGRES_PASSWORD: c2p_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c2p_user -d c2p_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: c2p_backend
    environment:
      SECRET_KEY: django-insecure-chave-temporaria-troque-em-producao
      DEBUG: "True"
      DB_NAME: c2p_db
      DB_USER: c2p_user
      DB_PASSWORD: c2p_password
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: c2p_frontend
    volumes:
      - ./frontend:/app
      # Preserva o node_modules do container — não sobrescreve com o local
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: